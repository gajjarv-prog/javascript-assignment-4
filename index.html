<!DOCTYPE html>
<html>
  <head>
    <title>Odd or Even</title>
  </head>
  <body>

    <h1>Odd or Even Numbers (0 to 200)</h1>

    <script>
      function checkOddEven() {
        for (let i = 0; i <= 200; i++) {

          if (i % 2 === 0) {
            document.write("<span style='color: blue;'>" + i + " - Even</span><br>");
          } else {
            document.write("<span style='color: red;'>" + i + " - Odd</span><br>");
          }
        }
      }

      // Call the function
      checkOddEven();
    </script>
  </body>
</html>
